<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cybersecurity operations visualization</title>
  <desc id="desc">A layered technology interface showing a protected digital network, live signals, and risk analysis.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071827"/><stop offset="1" stop-color="#0c3548"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#44e7ff" stop-opacity=".5"/><stop offset="1" stop-color="#44e7ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#77f4ff"/><stop offset="1" stop-color="#13b7d0"/></linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".35"/></filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse"><path d="M52 0H0V52" fill="none" stroke="#7defff" stroke-opacity=".08"/></pattern>
  </defs>
  <rect width="1400" height="1000" rx="52" fill="url(#bg)"/>
  <rect width="1400" height="1000" rx="52" fill="url(#grid)"/>
  <circle cx="860" cy="420" r="420" fill="url(#glow)" filter="url(#blur)"/>
  <g filter="url(#shadow)">
    <rect x="110" y="110" width="1180" height="780" rx="36" fill="#0a2131" fill-opacity=".86" stroke="#6cecff" stroke-opacity=".2"/>
    <path d="M110 210H1290" stroke="#d7fbff" stroke-opacity=".11"/>
    <circle cx="164" cy="161" r="8" fill="#32d5ea"/><circle cx="192" cy="161" r="8" fill="#1c7485"/><circle cx="220" cy="161" r="8" fill="#1c4e60"/>
    <text x="1118" y="167" fill="#71ddeb" font-family="Arial,sans-serif" font-size="22" letter-spacing="4">LIVE DEFENSE</text>
  </g>
  <g transform="translate(180 265)">
    <text fill="#668b9c" font-family="Arial,sans-serif" font-size="20" letter-spacing="3">EXPOSURE MAP</text>
    <g transform="translate(300 245)">
      <circle r="228" fill="none" stroke="#6cecff" stroke-opacity=".12" stroke-width="2"/>
      <circle r="170" fill="none" stroke="#6cecff" stroke-opacity=".3" stroke-dasharray="12 15" stroke-width="2"/>
      <circle r="105" fill="#0e3749" stroke="#65edff" stroke-opacity=".6" stroke-width="2"/>
      <path d="M0-55 49-34v39c0 43-20 77-49 94-29-17-49-51-49-94v-39z" fill="url(#cyan)" fill-opacity=".16" stroke="#72f1ff" stroke-width="3"/>
      <path d="m-22 10 15 15 34-43" fill="none" stroke="#94f7ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#68edff" stroke="#123e50" stroke-width="8"><circle cx="-154" cy="-117" r="14"/><circle cx="176" cy="-85" r="14"/><circle cx="-170" cy="116" r="14"/><circle cx="153" cy="135" r="14"/></g>
      <g stroke="#55d9ed" stroke-opacity=".5" stroke-width="2"><path d="M-143-106-66-49"/><path d="m163-76-72 43"/><path d="m-157 108 82-48"/><path d="m140 124-70-55"/></g>
    </g>
    <g transform="translate(650 60)">
      <rect width="330" height="118" rx="20" fill="#102f41" stroke="#82efff" stroke-opacity=".16"/>
      <text x="28" y="38" fill="#658b9c" font-family="Arial,sans-serif" font-size="16" letter-spacing="2">SECURITY POSTURE</text>
      <text x="28" y="87" fill="#f1fdff" font-family="Arial,sans-serif" font-size="42" font-weight="700">Protected</text>
      <circle cx="284" cy="63" r="20" fill="#43d7c2" fill-opacity=".17" stroke="#43d7c2"/><path d="m276 63 6 6 12-15" fill="none" stroke="#69f3de" stroke-width="3"/>
      <g transform="translate(0 144)">
        <rect width="330" height="270" rx="20" fill="#102f41" stroke="#82efff" stroke-opacity=".16"/>
        <text x="28" y="42" fill="#658b9c" font-family="Arial,sans-serif" font-size="16" letter-spacing="2">SIGNAL ACTIVITY</text>
        <path d="M28 205 73 167l42 21 49-80 43 36 47-72 48 33" fill="none" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M28 226H302M28 178H302M28 130H302M28 82H302" stroke="#8ceeff" stroke-opacity=".09"/>
        <g fill="#9af7ff"><circle cx="164" cy="108" r="6"/><circle cx="254" cy="72" r="6"/></g>
      </g>
    </g>
  </g>
  <g transform="translate(180 810)" font-family="Arial,sans-serif">
    <rect width="1010" height="2" fill="#71eaff" fill-opacity=".12"/>
    <g transform="translate(0 40)"><circle cx="8" cy="-5" r="8" fill="#42d8ec"/><text x="30" fill="#9ab5c2" font-size="18" letter-spacing="3">NETWORK</text></g>
    <g transform="translate(235 40)"><circle cx="8" cy="-5" r="8" fill="#43d7c2"/><text x="30" fill="#9ab5c2" font-size="18" letter-spacing="3">IDENTITY</text></g>
    <g transform="translate(475 40)"><circle cx="8" cy="-5" r="8" fill="#7e91ff"/><text x="30" fill="#9ab5c2" font-size="18" letter-spacing="3">CLOUD</text></g>
    <g transform="translate(670 40)"><circle cx="8" cy="-5" r="8" fill="#f0b65c"/><text x="30" fill="#9ab5c2" font-size="18" letter-spacing="3">HUMAN</text></g>
  </g>
</svg>
